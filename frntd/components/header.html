<style>
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10, 58, 95, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }

  .navbar.scrolled {
    background: rgba(10, 58, 95, 1);
    backdrop-filter: blur(10px);
    padding: 16px 24px;
    box-shadow: 0 4px 20px rgba(10, 58, 95, 0.4);
  }

  .logo {
    font-size: 1.5rem;
    font-weight: 700;
    color: #ffffff;
    text-decoration: none;
    letter-spacing: -0.03em;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo:hover {
    color: #e0f2fe;
    transform: scale(1.02);
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-links a {
    padding: 8px 20px;
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    border-radius: 8px;
    transition: all 0.3s ease;
  }

  .nav-links a:hover {
    color: #ffffff;
    background: rgba(255, 255, 255, 0.15);
  }

  .nav-links a.btn-signup {
    background: #ffffff;
    color: #0f4c81;
    font-weight: 600;
  }

  .nav-links a.btn-signup:hover {
    background: #e0f2fe;
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
  }

  @media (max-width: 768px) {
    .navbar {
      padding: 16px;
    }

    .nav-links {
      gap: 8px;
    }

    .nav-links a {
      padding: 6px 12px;
      font-size: 0.85rem;
    }
  }
</style>

<div class="navbar">
  <a href="{{BASE_PATH}}index.html" class="logo">
    <img
      src="{{BASE_PATH}}static/images/sehat-logo.png"
      alt="Sehat Logo"
      class="logo-icon"
    />
    Sehat
  </a>
  <nav class="nav-links" data-auth-links></nav>
</div>

<script>
  // Add scroll effect to navbar
  window.addEventListener("scroll", function () {
    const navbar = document.querySelector(".navbar");
    if (window.scrollY > 50) {
      navbar.classList.add("scrolled");
    } else {
      navbar.classList.remove("scrolled");
    }
  });
</script>
