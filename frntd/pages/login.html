<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sehat</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lucide-static@latest/font/lucide.css"
    />
    <link rel="stylesheet" href="../css/globals.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/form-message.css" />
  </head>
  <body class="login-page">
    <div id="toastContainer"></div>

    <!-- Background Effects -->
    <div class="bg-effects">
      <div class="radial-gradient"></div>
      <div class="grid-pattern"></div>
    </div>

    <header data-layout="header"></header>

    <main class="login-main">
      <div class="login-container">
        <!-- Header -->
        <div class="login-header">
          <div class="badge">
            <i data-lucide="shield-check" class="icon-sm"></i>
            Secure Login
          </div>
          <h1 class="login-title">Welcome Back</h1>
          <p class="login-subtitle">
            Sign in to access your healthcare dashboard
          </p>
        </div>

        <!-- User Type Toggle -->
        <div class="user-type-toggle-wrapper">
          <div class="user-type-toggle">
            <button type="button" class="toggle-btn active" data-type="patient">
              <i data-lucide="user" class="icon-sm"></i>
              Patient
            </button>
            <button type="button" class="toggle-btn" data-type="doctor">
              <i data-lucide="stethoscope" class="icon-sm"></i>
              Doctor
            </button>
          </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
          <form id="loginForm" class="login-form" novalidate>
            <input type="hidden" name="userType" value="patient" />

            <!-- Email -->
            <div class="form-group">
              <label for="email" class="form-label">
                <i data-lucide="mail" class="icon-sm"></i>
                Email Address
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="your.email@example.com"
                required
              />
            </div>

            <!-- Password -->
            <div class="form-group">
              <label for="password" class="form-label">
                <i data-lucide="lock" class="icon-sm"></i>
                Password
              </label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                required
              />
            </div>

            <!-- Remember & Forgot -->
            <div class="login-options">
              <label class="remember-checkbox">
                <input
                  type="checkbox"
                  class="custom-checkbox"
                  name="remember"
                />
                <span class="checkbox-text">Remember me</span>
              </label>
              <a href="javascript:void(0);" class="forgot-link"
                >Forgot Password?</a
              >
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="submit-btn"
              id="loginSubmitBtn"
              disabled
            >
              <i data-lucide="log-in" class="icon-sm"></i>
              Sign In
            </button>

            <!-- Switch to Signup -->
            <p class="switch-link">
              Don't have an account?
              <a href="signup.html" class="link-primary">Sign Up</a>
            </p>
          </form>
        </div>
      </div>
    </main>

    <footer data-layout="footer"></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
